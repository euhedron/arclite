name: Release

# On a version tag (`git tag v0.1.5 && git push --tags`), build the per-OS binaries and publish them as
# GitHub Release assets. Each Rust target builds on an available runner: Linux and Windows native, and
# BOTH macOS arches on the Apple-Silicon runner (aarch64 native, x86_64 cross-compiled — one macOS SDK
# builds both). We deliberately avoid a separate Intel-macOS (`macos-13`) runner: in the v0.1.4 release
# that job never obtained a runner and GitHub auto-cancelled it at the documented 24h queue limit, while
# every other job started within seconds. Asset names match what `arc update --apply` fetches:
# `arc-v<version>-<os>-<arch>[.exe]`, from Rust's `std::env::consts::{OS,ARCH}` (see update.rs::binary_name).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Create the Release once, before the matrix uploads race to attach assets to it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          --repo "${{ github.repository }}"
          --title "${{ github.ref_name }}"
          --notes "arc ${{ github.ref_name }}"
          --verify-tag || true

  upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: arc
            asset: arc-${{ github.ref_name }}-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: arc
            asset: arc-${{ github.ref_name }}-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: arc
            asset: arc-${{ github.ref_name }}-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: arc.exe
            asset: arc-${{ github.ref_name }}-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Add the Rust target
        run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage the asset under its release name
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.asset }}"
      - name: Upload the asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}"
          --repo "${{ github.repository }}" --clobber
