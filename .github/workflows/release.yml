name: Release

# On a version tag (`git tag v0.1.5 && git push --tags`), build the per-OS binaries and publish them as
# GitHub Release assets. Each Rust target builds on an available runner: Linux and Windows native, and
# BOTH macOS arches on the Apple-Silicon runner (aarch64 native, x86_64 cross-compiled — one macOS SDK
# builds both). We deliberately avoid a separate Intel-macOS (`macos-13`) runner: in the v0.1.4 release
# that job never obtained a runner and GitHub auto-cancelled it at the documented 24h queue limit, while
# every other job started within seconds. Asset names must be exactly what `arc update --apply` fetches
# — the convention lives in update.rs::asset_name, and the
# `release_workflow_assets_follow_the_one_naming_convention` test holds this matrix to it (edit either
# side alone and `cargo test` fails).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Create the Release once, as a draft, before the matrix uploads race to attach assets to it.
  # A draft stays mutable while the binaries are assembled; the final job publishes it only after
  # every upload succeeds. That order is required when repository release immutability is enabled.
  # Context values reach every `run:` below as environment variables, never inline `${{ }}`
  # interpolation into the script text: a ref name is repo-controlled input, and a tag like
  # `v1$(cmd)` is valid to git — as an env var it's inert data the shell quotes, not grammar.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      already_published: ${{ steps.release.outputs.already_published }}
    steps:
      - uses: actions/checkout@v7
      - name: Validate the tag — a safe path segment that matches Cargo.toml's version
        env:
          TAG: ${{ github.ref_name }}
        # The tag names release assets and rides into `cp` paths in the upload matrix; `v*` still
        # admits separators and metacharacters (`v1/x`), so require the shape the updater fetches
        # before anything acts on it. And the tag must be `v<Cargo.toml version>` exactly: the
        # updater treats the tag as the version it installs, so a mismatched tag would publish
        # binaries that report a different version than their release claims. The upload job needs
        # this one, so a bad tag stops everything.
        run: |
          case "$TAG" in
          *[!A-Za-z0-9._-]* | "")
            echo "tag '$TAG' is not a single safe path segment — refusing to release it" >&2
            exit 1
            ;;
          esac
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -1)
          if [ "$TAG" != "v$CARGO_VERSION" ]; then
            echo "tag '$TAG' does not match Cargo.toml's version 'v$CARGO_VERSION' — refusing to release a mislabeled binary" >&2
            exit 1
          fi
      - name: Create the draft release (idempotent)
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        # A failed run can resume an existing draft. A re-run of an already-published release is a
        # no-op: its assets may be immutable, so the upload jobs must not try to clobber them.
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "$TAG" --repo "$REPO" --json isDraft --jq .isDraft)
            if [ "$IS_DRAFT" = "false" ]; then
              echo "already_published=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TAG" \
              --notes "arc $TAG" \
              --verify-tag \
              --draft
          fi
          echo "already_published=false" >> "$GITHUB_OUTPUT"

  upload:
    needs: create-release
    if: needs.create-release.outputs.already_published != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: arc
            asset: arc-${{ github.ref_name }}-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: arc
            asset: arc-${{ github.ref_name }}-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: arc
            asset: arc-${{ github.ref_name }}-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: arc.exe
            asset: arc-${{ github.ref_name }}-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      BIN: ${{ matrix.bin }}
      ASSET: ${{ matrix.asset }} # carries the ref name — env-var indirection like TAG, same reason
    # One shell for every step on every runner: windows-latest defaults to pwsh, where `"$TARGET"`
    # is NOT an env-var reference (that's `$env:TARGET`) — rustup received an empty target and the
    # v0.1.8 Windows build died on it. Bash exists on all three runners; the env-var indirection
    # above assumes POSIX expansion, so the job states that assumption once instead of per step.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: Add the Rust target
        run: rustup target add "$TARGET"
      - run: cargo build --release --locked --target "$TARGET"
      - name: Stage the asset under its release name
        run: cp "target/$TARGET/release/$BIN" "$ASSET"
      - name: Upload the asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: >
          gh release upload "$TAG" "$ASSET"
          --repo "$REPO" --clobber

  publish-release:
    needs: [create-release, upload]
    if: needs.create-release.outputs.already_published != 'true' && success()
    runs-on: ubuntu-latest
    steps:
      - name: Publish the complete release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release edit "$TAG" --repo "$REPO" --draft=false
